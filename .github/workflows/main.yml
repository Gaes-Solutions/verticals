name: Main — Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    name: Build + push ${{ matrix.app }} → GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        # Cada app se buildea desde apps/<app>/Dockerfile y se publica como
        # ghcr.io/<repo>/<app>:<latest|sha>. Coincide con docker-compose.prod.yml.
        app: [api, web-tienda, web-admin, web-pos, web-superadmin]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login a GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.app }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build + push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/${{ matrix.app }}/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app }}

  notify-coolify:
    name: Trigger Coolify deploy webhook
    needs: build-and-push
    runs-on: ubuntu-latest
    if: ${{ vars.COOLIFY_WEBHOOK_URL != '' }}
    steps:
      - name: POST al webhook de Coolify
        env:
          WEBHOOK_URL: ${{ vars.COOLIFY_WEBHOOK_URL }}
          WEBHOOK_TOKEN: ${{ secrets.COOLIFY_WEBHOOK_TOKEN }}
        run: |
          curl -fsS -X GET "${WEBHOOK_URL}" \
            -H "Authorization: Bearer ${WEBHOOK_TOKEN}" \
            -H "Content-Type: application/json"
          echo "Coolify webhook llamado correctamente"
